<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GRIDLINE – Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #fdfdfd;
            color: #010101;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #073053;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .item {
            background: #ffffff;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #01010110;
            transition: 0.25s;
        }

        .item:hover {
            transform: scale(1.04);
            border-color: #ea1a1d;
        }

        .item img {
            width: 100%;
            border-radius: 10px;
        }

        .item-title {
            margin-top: 10px;
            font-weight: bold;
            color: #633734;
        }
    </style>
</head>
<body>

<h1>GRIDLINE – Product Gallery</h1>

<div class="gallery">

    <a class="item" href="item1.html">
        <img src="item1.jpg" alt="Item 1">
        <div class="item-title">Item 1</div>
    </a>

    <a class="item" href="item2.html">
        <img src="item2.jpg" alt="Item 2">
        <div class="item-title">Item 2</div>
    </a>

    <a class="item" href="item3.html">
        <img src="item3.jpg" alt="Item 3">
        <div class="item-title">Item 3</div>
    </a>

    <a class="item" href="item4.html">
        <img src="item4.jpg" alt="Item 4">
        <div class="item-title">Item 4</div>
    </a>

    <a class="item" href="item5.html">
        <img src="item5.jpg" alt="Item 5">
        <div class="item-title">Item 5</div>
    </a>

    <a class="item" href="item6.html">
        <img src="item6.jpg" alt="Item 6">
        <div class="item-title">Item 6</div>
    </a>

</div>

</body>
</html>
